version: "3.9"

services:

  rasa:
    image: rasa/rasa:3.6.2
    ports:
      - "5005:5005"
    volumes:
      - ./rasa:/app
    command: >
      run --enable-api --cors "*" --debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  action_server:
    image: rasa/rasa-sdk:3.6.2
    ports:
      - "5055:5055"
    volumes:
      - ./rasa/actions:/app/actions

  api:
    image: python:3.10-slim
    volumes:
      - ./api:/app
      - ./.env:/app/.env
    working_dir: /app
    command: >
      bash -c "pip install fastapi uvicorn requests python-dotenv redis &&
               uvicorn app:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8001:8000"
    depends_on:
      rasa:
        condition: service_healthy
      redis:
        condition: service_started

  whatsapp:
    build: ./whatsapp-service
    volumes:
      - ./whatsapp-service/auth_info:/app/auth_info
    depends_on:
      - api
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"